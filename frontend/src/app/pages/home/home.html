<div class="container mt-4">
  <h2 class="mb-4">Nuestro Catálogo</h2>

  <div class="row">
    <!-- El bloque @for repite la tarjeta por cada producto en tu arreglo -->
    @for (producto of productos; track producto.id) {
      <div class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm">
          <!-- Usamos [src] para enlazar dinámicamente la URL de la imagen -->
          <img [src]="producto.imagenUrl" class="card-img-top" alt="Imagen de {{ producto.titulo }}" style="object-fit: cover; height: 200px;">
          
          <div class="card-body d-flex flex-column">
            <!-- Interpolación {{ }} para mostrar texto -->
            <h5 class="card-title">{{ producto.titulo }}</h5>
            <h4 class="card-text text-success fw-bold">${{ producto.precio }}</h4>
            <p class="card-text text-muted mb-4">Stock disponible: {{ producto.stock }}</p>
            
            <!-- El botón lo tiramos hacia abajo con mt-auto -->
            <button class="btn btn-primary mt-auto">
              Agregar al carrito
            </button>
          </div>
        </div>
      </div>
    } @empty {
      <!-- Este bloque se muestra si el arreglo está vacío (mientras carga o si no hay stock) -->
      <div class="col-12 text-center mt-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Cargando...</span>
        </div>
        <p class="mt-2 text-muted">Cargando catálogo...</p>
      </div>
    }
  </div>
</div>
