spring.application.name=backend
# 1. URL de conexiˇn a la base de datos
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_db

# 2. Credenciales
spring.datasource.username=postgres
spring.datasource.password=1234

# 3. Crea o actualiza las tablas automßticamente al dar "Play"
spring.jpa.hibernate.ddl-auto=update

# 4. Muestra en la consola el SQL real que Java genera por abajo
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 5. Espera a que la tabla exista antes de insertar el dato
spring.jpa.defer-datasource-initialization=true

# 6. Le da permiso a Spring para correr el data.sql en PostgreSQL
spring.sql.init.mode=always